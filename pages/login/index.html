<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - MyTools</title>
  <link rel="stylesheet" href="../../renderer/global.css">
  <link rel="stylesheet" href="./style.css">
</head>
<body>
  <div class="login-container">
    <div class="login-card glass-card">
      <div class="login-header">
        <h2>Welcome Back</h2>
        <p>Login to access your tools</p>
      </div>
      <form id="login-form">
        <div class="input-group">
          <label for="username">Username</label>
          <input type="text" id="username" required placeholder="Enter username">
        </div>
        <div class="input-group">
          <label for="password">Password</label>
          <input type="password" id="password" required placeholder="Enter password">
        </div>
        <div class="checkbox-group">
          <input type="checkbox" id="remember-me">
          <label for="remember-me">Remember me</label>
        </div>
        <div id="error-message" class="error-message"></div>
        <button type="submit" class="btn-primary" id="login-btn">Login</button>
      </form>
      <div class="login-footer">
        <p>Don't have an account? <a href="#" onclick="goToRegister()">Register here</a></p>
      </div>
    </div>
  </div>
  <script src="../../renderer/navigation.js"></script>
  <script src="./script.js"></script>
</body>
</html>
